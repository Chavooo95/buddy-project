services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - database
    command: php -S 0.0.0.0:8000 -t public

###> doctrine/mongodb-odm-bundle ###
  mongodb:
    image: mongo:7
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_DB:-symfony_app}
    volumes:
      - mongodb_data:/data/db:rw
    ports:
      - "27017:27017"
###< doctrine/mongodb-odm-bundle ###

volumes:
  db-data:
###> doctrine/mongodb-odm-bundle ###
  mongodb_data:
###< doctrine/mongodb-odm-bundle ###
